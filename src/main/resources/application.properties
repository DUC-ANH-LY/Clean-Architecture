# Quarkus application configuration
quarkus.http.port=8081
quarkus.application.name=ecommerce-quarkus

# H2 database configuration
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

# Payment settings
payment.provider=stripe
stripe.secret-key=sk_test_quarkus_secret
vnpay.tmn-code=QUARKUS_TMN
vnpay.hash-secret=QUARKUS_SECRET
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
